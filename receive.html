<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>暮风藏情 - 收到告白</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",system-ui,sans-serif}
:root{--pink:#ff6b8b;--light:#ffc2d4;--dark:#d64c6e;--green:#52b788;--red:#ef5350;--gray:#444;--tlight:#a05872;--bg:rgba(255,255,255,0.72)}
body{background:linear-gradient(160deg,#ffe8f0,#ffd8e5,#ffc2d4);background-attachment:fixed;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:25px 20px 160px;position:relative;overflow:visible}
.float-heart{position:fixed;color:#ff87a2;font-size:20px;pointer-events:none;z-index:1;animation:floatUp 6s linear infinite;opacity:.7}
@keyframes floatUp{0%{transform:translateY(100vh)rotate(0);opacity:0}20%{opacity:.8}80%{opacity:.7}100%{transform:translateY(-20px)rotate(360deg);opacity:0}}
.card{background:var(--bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:30px;border-radius:24px;border:2px solid rgba(255,150,180,.4);box-shadow:0 8px 30px rgba(255,120,150,.25);width:100%;max-width:430px;position:relative;z-index:10;animation:fadeIn 1s ease-out forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px)scale(.96)}to{opacity:1;transform:translateY(0)scale(1)}}
.icon{text-align:center;font-size:36px;color:var(--pink);margin-bottom:10px;animation:beat 1.5s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.title{background:linear-gradient(120deg,var(--dark),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;font-size:26px;letter-spacing:4px;margin-bottom:12px;font-weight:600}
.mbox{background:#fffdfb;border-radius:18px;padding:22px;margin-bottom:20px;border:1px solid rgba(255,180,200,.5);min-height:120px;max-height:300px;overflow-y:auto;line-height:1.8;white-space:pre-line;box-shadow:0 4px 16px rgba(255,180,200,.18);background-image:linear-gradient(#ffd6e0 1px,transparent 1px);background-size:100% 30px;background-position:0 bottom;padding-bottom:40px}
.mbox::-webkit-scrollbar{width:4px}
.mbox::-webkit-scrollbar-thumb{background:#ff6b8b;border-radius:2px}
.db{display:flex;gap:12px;margin-bottom:20px;position:relative;min-height:60px;align-items:center;transition:all .3s}
.dbtn{padding:14px;border:none;border-radius:16px;font-size:15px;font-weight:500;cursor:pointer;transition:all .3s;letter-spacing:1px;position:relative;overflow:hidden;flex:1}
.dbtn:active{transform:scale(.96)}
.dbtn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .6s}
.dbtn:hover::after{left:100%}
.btn-agree{background:linear-gradient(135deg,var(--pink),#ff8da8);color:#fff;box-shadow:0 4px 12px rgba(255,107,139,.3);position:relative;z-index:20}
.btn-agree.cm{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:45%;max-width:160px;z-index:20}
.btn-refuse{background:#f0f0f0;color:#888;border:1px solid #ddd!important;box-shadow:0 4px 12px rgba(0,0,0,.05);position:relative;z-index:50}
.btn-refuse:hover{background:#e8e8e8}
.rw{margin-bottom:20px}
.qs{width:100%;padding:12px 14px;border:1px solid rgba(255,180,200,.6);border-radius:14px;font-size:14px;color:var(--gray);background:#fffdfb;outline:none;margin-bottom:12px}
.ri{width:100%;min-height:120px;max-height:200px;padding:16px 18px;border:1px solid rgba(255,180,200,.6);border-radius:16px;font-size:15px;background:#fffdfb;outline:none;resize:none;transition:all .3s;line-height:30px;background-image:linear-gradient(#ffd6e0 1px,transparent 1px);background-size:100% 30px;background-position:0 bottom;padding-bottom:40px}
.ri::-webkit-scrollbar{width:4px}
.ri::-webkit-scrollbar-thumb{background:#ff6b8b;border-radius:2px}
.ri:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,139,.25)}
.wi{text-align:right;font-size:12px;color:#888;margin-top:8px}
.wi.warn{color:var(--red)}
.sr{width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:500;cursor:pointer;letter-spacing:1px;background:linear-gradient(135deg,var(--pink),#ff8da8);color:#fff;box-shadow:0 4px 12px rgba(255,107,139,.3);transition:all .3s;position:relative;overflow:hidden}
.sr:active{transform:scale(.96)}
.sr:disabled{opacity:.7;cursor:not-allowed}
.sr::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .6s}
.sr:hover::after{left:100%}
.cc{margin-top:20px}
.cm{border:1px solid rgba(255,180,200,.5);border-radius:16px;padding:16px;height:220px;overflow-y:auto;background:#fffdfb;margin-bottom:12px;box-shadow:0 4px 16px rgba(255,180,200,.15)}
.cm .msg{margin-bottom:10px;padding:8px 14px;border-radius:14px;max-width:80%;clear:both;line-height:1.5;font-size:14px}
.msg.s{background:linear-gradient(135deg,#ff6b8b,#ff8da8);color:#fff;float:right}
.msg.r{background:#f0f0f0;float:left;color:#444}
.msg.sys{background:#fff3e0;color:#e65100;float:none;text-align:center;max-width:100%;font-size:13px;margin:12px 0}
.ci{display:flex;gap:10px;margin-top:10px}
.ci input{flex:1;padding:12px 16px;border:1px solid rgba(255,180,200,.5);border-radius:14px;outline:none;font-size:14px;background:#fffdfb;transition:all .3s}
.ci input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,139,.25)}
.bs{background:linear-gradient(135deg,var(--pink),#ff8da8);color:#fff;border:none;border-radius:14px;padding:12px 24px;cursor:pointer;font-size:15px;font-weight:500;transition:all .3s;position:relative;overflow:hidden}
.bs:active{transform:scale(.96)}
.bs::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .6s}
.bs:hover::after{left:100%}
.heart{position:fixed;pointer-events:none;color:var(--pink);font-size:24px;animation:hf 1.4s ease-out forwards;z-index:999}
@keyframes hf{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-140px)scale(1.6)}}
.hb{position:fixed;pointer-events:none;color:var(--red);font-size:24px;animation:hbr 1.2s ease-out forwards;z-index:999}
@keyframes hbr{0%{opacity:1;transform:translateY(0)rotate(0)scale(1)}50%{opacity:.8;transform:translateY(-60px)rotate(15deg)scale(1.2)}100%{opacity:0;transform:translateY(-120px)rotate(30deg)scale(.6)}}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-radius:50%;border-top-color:transparent;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
<div id="loadingView" style="text-align:center;color:#a05872;padding:30px 0;">
<div class="icon">💌</div>
<h2 class="title">加载中...</h2>
<p style="margin-top:12px;color:var(--tlight);">正在读取你的信件...</p>
</div>

<div id="contentView" style="display:none;">
<div class="icon">💌</div>
<h2 class="title">有人向你告白</h2>
<div class="mbox" id="confessionText"></div>
<div id="decisionArea">
<div class="db" id="btnGroup">
<button class="dbtn btn-agree" id="agreeBtn">💍 接受告白</button>
<button class="dbtn btn-refuse" id="refuseBtn">❌ 婉拒</button>
</div>
<div class="rw" id="replyBox" style="display:none;">
<select id="quoteSelect" class="qs">
<option value="">—— 选择一句回信语 ——</option>
<optgroup label="💕 同意心情（10款）">
<option value="1">双向心动，恰逢其时</option>
<option value="2">蓦然心动</option>
<option value="3">山野浪漫</option>
</optgroup>
<optgroup label="💔 拒绝 & 认错人（10款）">
<option value="11">认错人了</option>
<option value="12">心有所属</option>
<option value="13">适合朋友</option>
</optgroup>
</select>
<textarea class="ri" id="replyContent" placeholder="在此书写回信..." maxlength="480"></textarea>
<div class="wi" id="wordInfo">0 / 480 (0%)</div>
<button class="sr" id="sendReplyBtn">💌 寄出回信</button>
</div>
</div>
<div class="cc" id="chatContainer" style="display:none;">
<div class="cm" id="chatMessages"></div>
<div class="ci">
<input type="text" id="chatInput" placeholder="说点什么吧..." maxlength="500">
<button class="bs" id="sendBtn">发送</button>
</div>
</div>
</div>
</div>

<script>
var agreeReplies={
"1":"收到你的告白，心里满是惊喜与感动，其实我也早已对你心生好感。原来最好的缘分，就是我喜欢你的时候，恰好你也喜欢我。往后的日子，我们就正式在一起吧。不用轰轰烈烈，只求细水长流，彼此包容，互相理解，把每一个平凡的日子都过得甜甜蜜蜜。",
"2":"你从来不是我权衡利弊之后做出的选择，而是初见时蓦然心动，深思熟虑后依旧想要珍惜的人。这份心意我坦然收下，往后的路希望能与你并肩同行。只要身边是你，风雨也好，晴天也罢，我都满心欢喜。",
"3":"山野万里，星河漫漫，世间风景千千万万，而你是我藏在心底最温柔的浪漫。很开心能够收到你的告白，也恰好我对你有着同样的心意。往后的日子，愿我们彼此陪伴，彼此包容，一起奔赴更远的远方。"
};
var refuseReplies={
"11":"仔细看过你的留言，才发现原来是一场误会，很抱歉，你并不是我想要倾诉心里的那个人。这份真挚的情感十分珍贵，还请你好好留给真正对的人。也祝你早日遇见心意相通的人，拥有圆满美好的缘分。",
"12":"你是一个很优秀、很温柔的人，值得被好好偏爱与珍惜。只是很遗憾，我的心里早已住进了别人，实在无法回应你的心意。希望你调整好心情继续向前，一定会遇见那个满心都是你的人。",
"13":"感谢你坦诚说出内心的想法，只是斟酌许久，我觉得我们更适合以朋友的身份相处。进一步会显得尴尬，退一步又舍不得这份情谊，维持现状便是最好的选择。愿我们都能守住这份美好，各自安好。"
};

function createHeart(e){
for(var i=0;i<6;i++){
var h=document.createElement('div');h.className='heart';h.innerText='💖';
h.style.left=e.clientX+'px';h.style.top=e.clientY+'px';
document.body.appendChild(h);setTimeout(function(){h.remove()},1400)}
}
function createBreakHeart(e){
var h=document.createElement('div');h.className='hb';h.innerText='💔';
h.style.left=e.clientX+'px';h.style.top=e.clientY+'px';
document.body.appendChild(h);setTimeout(function(){h.remove()},1200)}
function getSafeTranslate(){
var ox=(Math.random()-.5)*160,oy=(Math.random()-.5)*100;
return 'translate('+ox+'px,'+oy+'px)'
}

var params=new URLSearchParams(window.location.search);
var token=params.get('token');

if(!token){
token=localStorage.getItem('love_receiver_token');
if(!token){
document.getElementById('loadingView').innerHTML='<h3 style="color:var(--red);">❌ 无效链接</h3><p style="margin-top:12px;color:var(--tlight);">链接缺少参数，请检查地址是否正确。</p>';
throw new Error('无效链接')}
}
localStorage.setItem('love_receiver_token',token);

var MAX=480,lmc=0,pt=null,chosen=false,rcn=0,nc=4,as=1,rs=1,AS=0.35,RS=0.18;
var ab=document.getElementById('agreeBtn'),rb=document.getElementById('refuseBtn');
var rbx=document.getElementById('replyBox'),rc=document.getElementById('replyContent');
var srb=document.getElementById('sendReplyBtn'),qs=document.getElementById('quoteSelect');
var wi=document.getElementById('wordInfo'),cc=document.getElementById('chatContainer');
var cm=document.getElementById('chatMessages'),ci=document.getElementById('chatInput');
var sb=document.getElementById('sendBtn'),bg=document.getElementById('btnGroup');
var da=document.getElementById('decisionArea'),ct=document.getElementById('confessionText');

function uwc(){
var l=rc.value.length,p=Math.min(Math.round(l/MAX*100),100);
wi.innerText=l+' / '+MAX+' ('+p+'%)';
wi.className='wi'+(l>=430?' warn':'')
}

// 立即获取消息（不等待第一个轮询周期）
async function fetchMessages(){
var res=await fetch('/api/get-session?token='+token);
var ct=res.headers.get('content-type')||'';
if(!ct.includes('application/json')){var txt=await res.text();throw new Error('API返回格式异常，请检查路由配置');}
var data=await res.json();
if(!res.ok)throw new Error(data.error||'获取会话失败');
if(data.messages&&data.messages.length>lmc){renderMsgs(data.messages);lmc=data.messages.length}
return data
}

function startPolling(){
if(pt)return;
pt=setInterval(async function(){
try{await fetchMessages()}catch(e){console.error('轮询失败',e)}
},2000)
}

function renderMsgs(msgs){
cm.innerHTML='';
for(var i=0;i<msgs.length;i++){
var m=msgs[i];
var div=document.createElement('div');
// 系统消息：包含接受/婉拒/告白等关键词
if((m.content&&m.content.indexOf('接受')!==-1&&m.content.indexOf('告白')!==-1)||(m.content&&m.content.indexOf('婉拒')!==-1)){
div.className='msg sys'
}else{
// 接收方视角：自己的消息（receiver）在右侧，对方消息（sender）在左侧
div.className='msg '+(m.role==='receiver'?'s':'r')
}
div.innerText=m.content;
cm.appendChild(div)}
cm.scrollTop=cm.scrollHeight
}

function saveState(decision,txt){
localStorage.setItem('love_recv_decided_'+token,JSON.stringify({decision:decision,text:txt}))
}

function loadState(){
try{var s=localStorage.getItem('love_recv_decided_'+token);return s?JSON.parse(s):null}catch(e){return null}
}

async function init(){
try{
// 第一步：先读取会话数据（base + 已有消息），不标记 joined（避免 check-join 超时导致白屏）
var sessionData=await fetchMessages();
if(!sessionData||!sessionData.base)throw new Error('会话不存在或已过期');
ct.innerText=sessionData.base;
document.getElementById('loadingView').style.display='none';
document.getElementById('contentView').style.display='block';

var agreeMsg=sessionData.agree||'我愿意！以后请多指教';
var refuseMsg=sessionData.refuse||'谢谢你喜欢我，但对不起..';

// 检查之前是否已回复过
var savedState=loadState();
if(savedState&&savedState.decision){
chosen=true;
rc.value=savedState.text;uwc();
rbx.style.display='block';
rbx.dataset.choice=savedState.decision;
bg.style.display='none';
da.style.display='none';
cc.style.display='block';
return // 已回复过，不需要标记 joined
}

// 第二步：标记 joined（接收方打开了链接）—— 不阻塞 UI
setTimeout(function(){
fetch('/api/check-join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token})}).catch(function(e){console.error('check-join 失败',e)})
},500);

qs.addEventListener('change',function(){
var v=this.value;
if(v&&agreeReplies[v]){rc.value=agreeReplies[v];uwc()}
else if(v&&refuseReplies[v]){rc.value=refuseReplies[v];uwc()}
});
rc.addEventListener('input',uwc);

ab.addEventListener('click',function(e){
if(chosen)return;
chosen=true;rcn=0;
ab.style.transform='';rb.style.transform='';as=1;rs=1;ab.classList.remove('cm');
createHeart(e);
rc.value=agreeMsg;uwc();
rbx.style.display='block';rbx.dataset.choice='agree';
bg.style.display='none';
});

rb.addEventListener('click',function(e){
if(chosen)return;
rcn++;rs-=RS;as+=AS;
var sp=getSafeTranslate();
rb.style.transform=sp+' scale('+rs+')';
ab.classList.add('cm');
ab.style.transform='translate(-50%,-50%) scale('+as+')';
createBreakHeart(e);
if(rcn>=nc){
chosen=true;
ab.style.transform='';rb.style.transform='';as=1;rs=1;ab.classList.remove('cm');
rc.value=refuseMsg;uwc();
rbx.style.display='block';rbx.dataset.choice='refuse';
bg.style.display='none'}
});

srb.addEventListener('click',async function(e){
if(srb.disabled)return;
var choice=rbx.dataset.choice;
var text=rc.value.trim();
if(!text){alert('请输入回信内容');return}
srb.disabled=true;srb.innerHTML='<span class="loading"></span> 寄出中...';
createHeart(e);
try{
var tag=choice==='agree'?'💍 对方接受了你的告白！\n':'对方婉拒了你的告白。\n';
var systemMsg=tag+text;
await fetch('/api/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,role:'receiver',content:systemMsg})});
saveState(choice,text);
da.style.display='none';
cc.style.display='block';
lmc=0;await fetchMessages()
}catch(err){alert('发送失败，请重试');srb.disabled=false;srb.innerHTML='💌 寄出回信'}
});

startPolling()
}catch(e){
document.getElementById('loadingView').innerHTML='<h3 style="color:var(--red);">❌ '+e.message+'</h3>'}
}

sb.addEventListener('click',async function(){if(sb.disabled)return;sb.disabled=true;await sendChat();sb.disabled=false});
ci.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});

async function sendChat(){
var content=ci.value.trim();
if(!content)return;
try{
await fetch('/api/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,role:'receiver',content:content})});
ci.value='';lmc=0
}catch(e){console.error('发送失败',e)}
}

window.addEventListener('beforeunload',function(){if(pt){clearInterval(pt);pt=null}});

function fh(){var h=document.createElement('div');h.className='float-heart';h.innerText='❤';h.style.left=Math.random()*100+'%';h.style.animationDuration=(4+Math.random()*4)+'s';document.body.appendChild(h);setTimeout(function(){h.remove()},8000)}
setInterval(fh,800);

init();
</script>
</body>
</html>
