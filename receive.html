<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暮风藏情 - 接收告白</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", system-ui, sans-serif; }
        :root {
            --main-pink: #ff6b8b; --light-pink: #ffc2d4; --dark-pink: #d64c6e;
            --success-green: #52b788; --danger-red: #ef5350; --text-gray: #444;
            --text-light: #a05872; --bg-blur: rgba(255, 255, 255, 0.72);
        }
        body {
            background: linear-gradient(160deg, #ffe8f0, #ffd8e5, #ffc2d4);
            background-attachment: fixed; min-height: 100vh; display: flex;
            justify-content: center; align-items: flex-start; padding: 25px 20px 160px;
            position: relative; overflow: hidden;
        }
        .float-heart {
            position: fixed; color: #ff87a2; font-size: 20px; pointer-events: none; z-index: 1;
            animation: floatUp 6s linear infinite; opacity: 0.7;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; } 80% { opacity: 0.7; }
            100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
        }
        .petal {
            position: fixed; width: 12px; height: 12px; background: #ffc8d8; border-radius: 50%;
            opacity: 0.5; pointer-events: none; animation: petalFall 12s linear infinite; z-index: 1;
        }
        @keyframes petalFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; } 90% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .light-dot {
            position: fixed; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #ffb8cc; pointer-events: none; animation: twinkle 3s ease-in-out infinite; z-index: 1;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        .receive-card {
            background: var(--bg-blur); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 24px; border: 2px solid rgba(255, 150, 180, 0.4);
            box-shadow: 0 8px 30px rgba(255, 120, 150, 0.25); width: 100%; max-width: 430px;
            position: relative; overflow: visible; z-index: 10; animation: cardFadeIn 1s ease-out forwards;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .envelope-icon { text-align: center; font-size: 36px; color: var(--main-pink); margin-bottom: 10px; animation: beat 1.5s ease-in-out infinite; }
        @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .page-box { display: none; opacity: 0; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .page-box.active { display: block; opacity: 1; transform: translateY(0); }
        .title {
            background: linear-gradient(120deg, var(--dark-pink), var(--main-pink));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-align: center; font-size: 28px; letter-spacing: 4px; margin-bottom: 12px; font-weight: 600;
        }
        .tip-desc { text-align: center; color: var(--text-light); font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        .msg-box {
            background: #fffdfb; border-radius: 18px; padding: 22px; margin-bottom: 30px;
            border: 1px solid rgba(255, 180, 200, 0.5); min-height: 200px; max-height: 240px;
            overflow-y: auto; box-shadow: 0 4px 16px rgba(255, 180, 200, 0.18);
            transition: transform 0.3s ease; line-height: 30px;
            background-image: linear-gradient(#ffd6e0 1px, transparent 1px);
            background-size: 100% 30px; background-position: 0 bottom; padding-bottom: 40px;
        }
        .msg-box::-webkit-scrollbar { width: 4px; }
        .msg-box::-webkit-scrollbar-thumb { background: #ff6b8b; border-radius: 2px; }
        .msg-box:hover { transform: translateY(-3px); }
        .msg-label { color: var(--text-light); font-size: 14px; margin-bottom: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .msg-label::before { content: "💌"; }
        .msg-content { color: var(--text-gray); line-height: 30px; font-size: 15px; min-height: 140px; white-space: pre-line; }
        .msg-content.empty { color: #999; font-style: italic; }
        .reply-btn-group {
            display: flex; gap: 18px; margin-bottom: 20px; position: relative;
            transition: all 0.3s ease; min-height: 60px; align-items: center; justify-content: space-between;
        }
        .reply-btn, .write-reply-btn, .submit-reply {
            border-radius: 14px; border: none; font-size: 15px; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden; font-weight: 500;
        }
        .reply-btn::after, .write-reply-btn::after, .submit-reply::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }
        .reply-btn:hover::after, .write-reply-btn:hover::after, .submit-reply:hover::after { left: 100%; }
        .reply-btn:active, .write-reply-btn:active, .submit-reply:active { transform: scale(0.96); }
        .reply-btn { width: 45%; max-width: 160px; padding: 14px; }
        .agree-btn {
            background: linear-gradient(135deg, var(--success-green), #52b788); color: #fff;
            box-shadow: 0 4px 12px rgba(82, 183, 136, 0.3);
        }
        .agree-btn.center-mode { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        .refuse-btn {
            background: linear-gradient(135deg, var(--danger-red), #e57373); color: #fff;
            box-shadow: 0 4px 12px rgba(239, 83, 80, 0.3); position: relative; z-index: 20;
        }
        .write-reply-btn {
            width: 100%; padding: 15px; margin-top: 15px;
            background: linear-gradient(135deg, var(--main-pink), #ff8da8); color: #fff;
            box-shadow: 0 4px 12px rgba(255, 107, 139, 0.3);
        }
        .reply-wrap { position: relative; margin-bottom: 22px; }
        .quote-select {
            width: 100%; padding: 12px 14px; border: 1px solid rgba(255, 180, 200, 0.6);
            border-radius: 14px; font-size: 14px; color: var(--text-gray); background: #fffdfb; outline: none; margin-bottom: 12px;
        }
        .reply-input {
            width: 100%; min-height: 160px; max-height: 200px; padding: 16px 18px;
            border: 1px solid rgba(255, 180, 200, 0.6); border-radius: 16px; font-size: 15px;
            background: #fffdfb; outline: none; resize: none; overflow-y: auto;
            transition: all 0.3s ease; line-height: 30px;
            background-image: linear-gradient(#ffd6e0 1px, transparent 1px);
            background-size: 100% 30px; background-position: 0 bottom; padding-bottom: 40px;
        }
        .reply-input::-webkit-scrollbar { width: 4px; }
        .reply-input::-webkit-scrollbar-thumb { background: #ff6b8b; border-radius: 2px; }
        .reply-input:focus { border-color: var(--main-pink); box-shadow: 0 0 0 3px rgba(255, 107, 139, 0.25); }
        .word-info { text-align: right; font-size: 12px; color: #888; margin-top: 8px; }
        .word-info.warn { color: var(--danger-red); }
        .submit-reply {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--main-pink), #ff8da8);
            color: #fff; font-size: 16px; letter-spacing: 1px; box-shadow: 0 4px 12px rgba(255, 107, 139, 0.3);
        }
        .submit-reply:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }
        .tip-text { text-align: center; margin-top: 14px; font-size: 14px; height: 20px; }
        .heart {
            position: fixed; pointer-events: none; color: var(--main-pink); font-size: 24px;
            animation: heartFly 1.4s ease-out forwards; z-index: 999;
        }
        @keyframes heartFly {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-140px) scale(1.6); }
        }
        .heart-break {
            position: fixed; pointer-events: none; color: var(--danger-red); font-size: 24px;
            animation: heartBreak 1.2s ease-out forwards; z-index: 999;
        }
        @keyframes heartBreak {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            50% { opacity: 0.8; transform: translateY(-60px) rotate(15deg) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) rotate(30deg) scale(0.6); }
        }
        .heart-rain {
            position: fixed; pointer-events: none; z-index: 998; font-size: 20px;
            animation: rainDrop 3s ease-out forwards;
        }
        @keyframes rainDrop {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .refuse-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border-radius: 16px; padding: 18px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 10000;
            display: flex; align-items: center; gap: 12px; font-size: 15px; color: var(--text-gray);
            max-width: 90vw; animation: toastIn 0.4s ease-out;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .refuse-toast .emoji { font-size: 24px; }
        .soul-question {
            text-align: center; font-size: 14px; color: var(--dark-pink); margin: 8px 0 16px;
            padding: 10px; background: rgba(255, 182, 193, 0.2); border-radius: 12px; font-style: italic;
        }
        .hesitate-tip {
            text-align: center; font-size: 14px; color: #d64c6e; margin-top: 12px;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .hesitate-tip.show { opacity: 1; }
        .mood-tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .mood-tag {
            padding: 6px 14px; border-radius: 20px; background: #ffd6e0; border: none;
            font-size: 14px; cursor: pointer; transition: all 0.2s ease; color: var(--dark-pink);
        }
        .mood-tag:hover { background: var(--main-pink); color: #fff; transform: translateY(-2px); }
        .loading {
            display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
            border-radius: 50%; border-top-color: transparent; animation: rotate 0.8s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="petal" style="left:12%;animation-delay:0s;"></div>
    <div class="petal" style="left:60%;animation-delay:5s;"></div>
    <div class="light-dot" style="top:25%;left:18%;"></div>
    <div class="light-dot" style="top:60%;right:12%;animation-delay:1.5s;"></div>

    <div class="receive-card">
        <div class="envelope-icon">💌</div>
        <div class="page-box active" id="page1">
            <h2 class="title">暮风藏情</h2>
            <p class="tip-desc">收到一封来自远方的信件</p>
            <div class="msg-box">
                <p class="msg-label">对方想对你说：</p>
                <div class="msg-content" id="baseText"></div>
            </div>
            <div class="reply-btn-group" id="btnGroup">
                <button class="reply-btn agree-btn" id="goP2">欣然接受</button>
                <button class="reply-btn refuse-btn" id="goP3">委婉拒绝</button>
            </div>
            <div class="hesitate-tip" id="hesitateTip">慢慢想，不着急。无论你的选择是什么，都值得被尊重。</div>
        </div>

        <div class="page-box" id="page2">
            <h2 class="title">暮风藏情</h2>
            <p class="tip-desc">已收下这份温柔心意</p>
            <div class="msg-box">
                <p class="msg-label">对方预留信件：</p>
                <div class="msg-content" id="agreeText"></div>
            </div>
            <button class="write-reply-btn" id="goP4From2">写回信</button>
        </div>

        <div class="page-box" id="page3">
            <h2 class="title">暮风藏情</h2>
            <p class="tip-desc">感谢你的真诚来信</p>
            <div class="msg-box">
                <p class="msg-label">对方预留信件：</p>
                <div class="msg-content" id="refuseText"></div>
            </div>
            <button class="write-reply-btn" id="goP4From3">写回信</button>
        </div>

        <div class="page-box" id="page4">
            <h2 class="title">暮风藏情</h2>
            <p class="tip-desc">提笔写下你的回信</p>
            <div class="reply-wrap">
                <select id="quoteSelect" class="quote-select">
                    <option value="">—— 选择一句回信语录 ——</option>
                    <optgroup label="✅ 同意心情（10款）">
<option value="落日沉溺于橘色的海，晚风沦陷于赤诚的爱。当我看到这份心意时，内心满是欢喜与悸动，原来双向奔赴的感觉如此美好。漫长岁月里，能遇见彼此是难得的缘分，往后我愿意和你一起感受四季流转，分享生活里所有细碎的美好，把每一段平凡时光都过得温柔又浪漫。">1. 落日晚风</option>
<option value="你从不是我权衡利弊之后做出的选择，而是初见时怦然心动，深思熟虑后依旧想要珍惜的人。这份心意我坦然收下，往后的路希望能与你并肩同行。不用纠结前路如何，只要身边是你，风雨也好，晴天也罢，我都满心欢喜，认真对待这份来之不易的情愫。">2. 怦然心动</option>
<option value="山野万里，星河漫漫，世间风景千千万，而你是我藏在心底最温柔的浪漫。很开心能够收到你的告白，也恰好我对你有着同样的心意。往后的日子，愿我们彼此陪伴，彼此包容，一起奔赴更远的远方，让温柔与偏爱，一直停留在彼此身旁。">3. 山野浪漫</option>
<option value="往后朝夕，三餐四季，细水长流的日常是你，柴米油盐的烟火也是你。我愿意接受这份真挚的喜欢，从此生活多了一份期待与甜蜜。不必轰轰烈烈，只愿岁岁年年相守相伴，把简单的日子过得温馨踏实，让爱意在朝夕相处中慢慢沉淀、愈发浓厚。">4. 余生是你</option>
<option value="从前总觉得人生旅途平淡无奇，直到遇见你才明白，原来快乐可以如此简单。你的出现照亮了我的生活，也让平凡的日子充满甜度。我很开心回应你的心意，希望我们能珍惜这份相遇，在往后时光里互相温暖，把所有美好与温柔，尽数赠予对方。">5. 甜的很长</option>
<option value="心脏天生偏向左侧，就像我对你的偏爱从来都自然而然，毫无缘由。收到你的告白，我心里满是欣喜，决定坦然接受这份喜欢。往后我会明目张胆地偏向你，认真守护这份感情，一起走过朝朝暮暮，让爱意贯穿生活的每一个角落。">6. 对你偏心</option>
<option value="遇见你的每一天都格外温柔，哪怕只是迎面吹来的微风，都像是将一整个明媚的春天拥入怀中。我十分珍惜这份心意，也愿意和你携手同行。愿我们带着这份热忱与欢喜，慢慢相处、慢慢了解，在岁月里相守，让美好一直延续下去。">7. 拥入春天</option>
<option value="平日里总有忙不完的琐事，可只要想到你，就忍不住停下脚步想多聊几句。你的心意我完全收下，能够被你喜欢是一件很幸福的事。往后闲暇之时我们可以畅谈心事，分享喜怒哀乐，让彼此成为生活里最贴心的陪伴，温暖漫长岁月。">8. 只想聊你</option>
<option value="爱意不必时时挂在嘴边，却会藏在日常的一点一滴里，思念也会伴随朝暮岁岁不息。如今我回应你的心意，满心满眼皆是对你的期许与温柔。愿我们带着真诚与真心相处，彼此理解、彼此体谅，让这份感情安稳长久，不负相遇，不负真心。">9. 满心是你</option>
<option value="被人认真喜欢的感觉格外温暖，仿佛世间所有的温柔与善意，都纷纷落在了自己身上。我欣然接受你的告白，感恩这场美好的相遇。未来的路，希望我们携手相伴，用心对待彼此，在平淡生活里制造惊喜，在漫长时光里守护这份纯粹的爱意。">10. 温柔落我</option>
                    </optgroup>
                    <optgroup label="❌ 拒绝 & 认错人（10款）">
<option value="仔细看过你的留言，才发现原来是一场误会，很抱歉，你并不是我想要倾诉心里的那个人。这份真挚的情感十分珍贵，还请你好好留给真正对的人。也祝你早日遇见心意相通的人，拥有一段圆满美好的缘分，不被遗憾打扰，岁岁平安顺遂。">11. 认错人了</option>
<option value="你是一个很优秀、很温柔的人，值得被好好偏爱与珍惜。只是很遗憾，我的心里早已住进了别人，实在无法回应你的心意。希望你不要因为这次的结果感到失落，收拾好心情继续向前，一定会在前路遇见那个满心都是你的人。">12. 心有所属</option>
<option value="感谢你坦诚说出内心的想法，只是斟酌许久，我觉得我们更适合以朋友的身份相处。进一步会显得尴尬，退一步又舍不得这份情谊，维持现状便是最好的选择。愿我们都能守住这份简单的美好，各自安好，在不同的轨迹里遇见属于自己的幸福。">13. 适合朋友</option>
<option value="十分感谢你愿意把心底的喜欢讲给我听，这份勇气与真诚让我很感动。但目前我暂时没有开启一段恋情的想法，不想耽误你的时间与真心。希望你能够理解，也愿你保持热忱，奔赴属于自己的美好，早日收获双向的喜欢。">14. 不想恋爱</option>
<option value="认真看完你的告白，思量再三，还是决定坦诚相待。很抱歉，我对你始终没有心动的感觉，不愿勉强自己，也不想欺骗你的真心。你很好，只是我们并不合适，希望你早日放下，继续向前，遇见那个能让你满心欢喜的人。">15. 没有心动</option>
<option value="很遗憾没能回应你的心意，这并不是因为你不够优秀，只是人与人之间讲究缘分与契合，我们恰好不是彼此合适的那个人。感谢你的青睐与坦诚，愿你不必纠结过往，带着善意继续前行，在往后的日子里遇见灵魂契合的相伴之人。">16. 刚好不合适</option>
<option value="感谢你鼓起勇气表达心意，我也认真思考了很久。我或许在旁人眼中还算不错，但并不是你心中所期待的模样。实在抱歉无法接受这份喜欢，希望你能遇见真正契合、能与你同频同行的人，拥有满心欢喜的生活。">17. 不是那种好</option>
<option value="你真诚又热烈，值得世间最好的偏爱与陪伴，而我没办法给你同等的回应，所以不愿耽误你前行。真心祝愿你放下这份执念，去遇见那个愿意为你奔赴、也能接住你所有温柔的人，愿你的每份喜欢，都能得到圆满回应。">18. 值得更好</option>
<option value="谢谢你不顾一切奔赴而来的喜欢，可我终究不是那个值得你奋力向前的人。不想让你继续在我身上耗费心思与情绪，所以坦然说出想法。愿你及时转身，去往属于自己的远方，遇见那个愿意和你双向奔赴、相守一生的人。">19. 不值得狂奔</option>
<option value="承蒙你的厚爱与真心，我心怀感激。只是此刻我的内心暂时不想接纳新的感情，心门暂且关闭。还望你能够谅解，不必为此停留。山水一程，有幸相遇，愿我们往后各自安好，前路光明，都能得偿所愿，拥抱属于自己的幸福。">20. 心已打烊</option>
                    </optgroup>
                </select>

                <div class="mood-tags">
                    <button class="mood-tag" data-emoji="😊">😊 开心</button>
                    <button class="mood-tag" data-emoji="🥺">🥺 感动</button>
                    <button class="mood-tag" data-emoji="😳">😳 害羞</button>
                    <button class="mood-tag" data-emoji="🤗">🤗 温暖</button>
                    <button class="mood-tag" data-emoji="😢">😢 遗憾</button>
                </div>

                <textarea class="reply-input" id="replyContent" placeholder="在此书写回信..." maxlength="1000"></textarea>
                <div class="soul-question" id="soulQuestion"></div>
                <div class="word-info" id="wordInfo">0 / 1000 (0%)</div>
            </div>

            <button class="submit-reply" id="submitReply">寄出回信</button>
            <p class="tip-text" id="replyTip"></p>
        </div>
    </div>

<script>
    // ---------- 页面栈导航 ----------
    const pages = {
        page1: document.getElementById('page1'),
        page2: document.getElementById('page2'),
        page3: document.getElementById('page3'),
        page4: document.getElementById('page4')
    };
    let currentPage = 'page1';
    history.replaceState({ page: 'page1' }, '', location.href);
    function showPage(pageId) {
        if (!pages[pageId]) return;
        Object.values(pages).forEach(el => el.classList.remove('active'));
        pages[pageId].classList.add('active');
        currentPage = pageId;
    }
    function navigateTo(pageId) {
        if (pageId === currentPage) return;
        history.pushState({ page: pageId }, '', location.href);
        showPage(pageId);
    }
    window.addEventListener('popstate', (e) => {
        const state = e.state;
        if (state && state.page) showPage(state.page);
        else showPage('page1');
    });
    window.addEventListener('load', () => {
        if (history.state && history.state.page) showPage(history.state.page);
        else showPage('page1');
    });

    // ---------- 漂浮特效 ----------
    function createFloatHeart(){
        const heart = document.createElement("div");
        heart.className = "float-heart";
        heart.innerText = "❤";
        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDuration = (4 + Math.random() * 4) + "s";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),8000);
    }
    setInterval(createFloatHeart, 800);

    // ---------- 状态变量 ----------
    let isSubmiting = false;
    let refuseClickNum = 0;
    const needClick = 4;
    let agreeScale = 1;
    let refuseScale = 1;
    const MAX_WORD = 1000;
    const AGREE_SCALE_STEP = 0.35;
    const REFUSE_SCALE_STEP = 0.18;

    // ---------- 读取URL参数 ----------
    const urlParams = new URLSearchParams(window.location.search);
    const baseMsg = urlParams.get('base') || '';
    const agreeMsg = urlParams.get('agree') || '';
    const refuseMsg = urlParams.get('refuse') || '';

    const baseTextEl = document.getElementById('baseText');
    const agreeTextEl = document.getElementById('agreeText');
    const refuseTextEl = document.getElementById('refuseText');

    // 空状态友好提示
    baseTextEl.innerText = baseMsg || '对方暂时没有留下悄悄话，但心意已经随风送达。';
    agreeTextEl.innerText = agreeMsg || '对方似乎有些害羞，没有留下额外的文字，但温柔都藏在行动里。';
    refuseTextEl.innerText = refuseMsg || '虽然没能如愿，但这份真诚已经妥善收藏。';
    if (!baseMsg) baseTextEl.classList.add('empty');
    if (!agreeMsg) agreeTextEl.classList.add('empty');
    if (!refuseMsg) refuseTextEl.classList.add('empty');

    // ---------- 元素引用 ----------
    const goP2 = document.getElementById('goP2');
    const goP3 = document.getElementById('goP3');
    const goP4From2 = document.getElementById('goP4From2');
    const goP4From3 = document.getElementById('goP4From3');
    const submitReply = document.getElementById('submitReply');
    const replyContent = document.getElementById('replyContent');
    const replyTip = document.getElementById('replyTip');
    const wordInfo = document.getElementById('wordInfo');
    const quoteSelect = document.getElementById('quoteSelect');
    const hesitateTip = document.getElementById('hesitateTip');
    const soulQuestion = document.getElementById('soulQuestion');

    // 缓存拒绝按钮的原始位置和尺寸
    let goP3OrigRect = null;
    function updateOrigRect() {
        const origTransform = goP3.style.transform;
        goP3.style.transform = 'none';
        goP3OrigRect = goP3.getBoundingClientRect();
        goP3.style.transform = origTransform;
    }
    window.addEventListener('load', updateOrigRect);
    window.addEventListener('resize', updateOrigRect);

    // 语录填充
    quoteSelect.addEventListener('change', function(){
        const val = this.value;
        if(val){
            replyContent.value = val;
            updateWordCount();
        }
    });

    replyContent.addEventListener('input', function() {
        this.scrollTop = this.scrollHeight;
    });

    function updateWordCount() {
        let len = replyContent.value.length;
        let percent = Math.round(len / MAX_WORD * 100);
        wordInfo.innerText = `${len} / ${MAX_WORD} (${percent}%)`;
        wordInfo.className = 'word-info' + (len >= 900 ? ' warn' : '');
    }
    replyContent.addEventListener('input', updateWordCount);

    // ---------- 爱心雨 ----------
    function startHeartRain() {
        for (let i = 0; i < 35; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-rain';
                heart.innerText = ['❤','💕','💖','💗','✨'][Math.floor(Math.random()*5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (2 + Math.random() * 3) + 's';
                heart.style.fontSize = (14 + Math.random() * 20) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 3500);
            }, i * 50);
        }
    }

    // ---------- 拒绝彩蛋 ----------
    function showRefuseToast() {
        const toast = document.createElement('div');
        toast.className = 'refuse-toast';
        toast.innerHTML = '<span class="emoji">🤭</span> 你跑得挺快嘛！不过心意已经传达到了，感谢你的真诚。';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 2200);
    }

    // ---------- 犹豫检测 ----------
    let hesitateTimer = null;
    function startHesitateTimer() {
        if (hesitateTimer) clearTimeout(hesitateTimer);
        hesitateTip.classList.remove('show');
        hesitateTimer = setTimeout(() => {
            hesitateTip.classList.add('show');
        }, 15000);
    }
    function clearHesitateTimer() {
        if (hesitateTimer) {
            clearTimeout(hesitateTimer);
            hesitateTimer = null;
        }
        hesitateTip.classList.remove('show');
    }
    startHesitateTimer();

    // ---------- 灵魂拷问 ----------
    const soulQuestions = [
        "如果用一个词形容对方，你会选什么？",
        "你们第一次见面是在哪里？",
        "你想对对方说一句什么悄悄话？",
        "收到告白时，你脑海里第一个画面是什么？",
        "如果给这份心意打个分，你会打几分？（满分10分）",
        "你希望对方此刻在你身边吗？",
        "下一次遇见，你会主动打招呼吗？",
        "你心里藏着什么没说出的话？"
    ];
    function refreshSoulQuestion() {
        const randomQ = soulQuestions[Math.floor(Math.random() * soulQuestions.length)];
        soulQuestion.innerText = '💬 ' + randomQ;
    }

    // ---------- 心情标签 ----------
    document.querySelectorAll('.mood-tag').forEach(tag => {
        tag.addEventListener('click', function() {
            const emoji = this.getAttribute('data-emoji');
            const currentText = replyContent.value;
            replyContent.value = emoji + ' ' + currentText;
            replyContent.focus();
            updateWordCount();
        });
    });

    // ---------- 特效生成函数 ----------
    function createHeart(e) {
        for (let i = 0; i < 6; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = '❤';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1400);
        }
    }
    function createBreakHeart(e) {
        const heart = document.createElement('div');
        heart.className = 'heart-break';
        heart.innerText = '💔';
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1200);
    }

    // 随机安全位置（拒绝按钮）
    function getRandomSafeTransform() {
        if (!goP3OrigRect) return `translate(0px, 0px) scale(${refuseScale})`;
        const padding = 10;
        const w = goP3OrigRect.width * refuseScale;
        const h = goP3OrigRect.height * refuseScale;
        const maxX = window.innerWidth - padding - w;
        const maxY = window.innerHeight - padding - h;
        const minX = padding;
        const minY = padding;
        const targetX = Math.random() * (maxX - minX) + minX;
        const targetY = Math.random() * (maxY - minY) + minY;
        const offsetX = targetX - goP3OrigRect.left;
        const offsetY = targetY - goP3OrigRect.top;
        return `translate(${offsetX}px, ${offsetY}px) scale(${refuseScale})`;
    }

    // ---------- 接受按钮 ----------
    goP2.addEventListener('click', (e) => {
        clearHesitateTimer();
        agreeScale += AGREE_SCALE_STEP;
        goP2.style.transform = `scale(${agreeScale})`;
        createHeart(e);
        startHeartRain();
        navigateTo('page2');
        refuseClickNum = 0;
        agreeScale = 1;
        refuseScale = 1;
        goP2.classList.remove('center-mode');
        goP2.style.transform = '';
        goP3.style.transform = '';
    });

    // ---------- 拒绝按钮（逃跑效果） ----------
    goP3.addEventListener('click', (e) => {
        clearHesitateTimer();
        refuseClickNum++;
        refuseScale -= REFUSE_SCALE_STEP;
        agreeScale += AGREE_SCALE_STEP;

        goP3.style.transform = getRandomSafeTransform();
        goP2.classList.add('center-mode');
        goP2.style.transform = `translate(-50%, -50%) scale(${agreeScale})`;

        createBreakHeart(e);

        if (refuseClickNum >= needClick) {
            showRefuseToast();
            setTimeout(() => {
                navigateTo('page3');
                refuseClickNum = 0;
                agreeScale = 1;
                refuseScale = 1;
                goP2.classList.remove('center-mode');
                goP2.style.transform = '';
                goP3.style.transform = '';
            }, 800);
        }
    });

    // ---------- 写回信按钮 ----------
    goP4From2.addEventListener('click', (e) => {
        createHeart(e);
        navigateTo('page4');
        refreshSoulQuestion();
    });
    goP4From3.addEventListener('click', (e) => {
        createHeart(e);
        navigateTo('page4');
        refreshSoulQuestion();
    });

    // ---------- 提交回信 ----------
    submitReply.addEventListener('click', async function(e) {
        if (isSubmiting) return;
        replyTip.innerText = '';
        const val = replyContent.value.trim();
        if (!val) {
            replyTip.style.color = '#e53e3e';
            replyTip.innerText = '请输入回信内容';
            return;
        }
        isSubmiting = true;
        submitReply.disabled = true;
        submitReply.innerHTML = '<span class="loading"></span> 寄出中...';
        createHeart(e);
        await new Promise(resolve => setTimeout(resolve, 1200));
        replyTip.style.color = '#22c55e';
        replyTip.innerText = '回信已成功寄出，心意送达！';
        submitReply.innerHTML = '寄出回信';
        submitReply.disabled = false;
        isSubmiting = false;
    });
</script>
</body>
</html>
