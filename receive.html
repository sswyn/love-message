<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>暮风藏情 - 收到告白</title>
    <style>
        /* 保留原有样式，新增聊天样式同上 */
    </style>
</head>
<body>
    <div class="receive-card">
        <div class="page-box active" id="loadingPage">
            <div class="envelope-icon">💌</div>
            <h2 class="title">加载中...</h2>
        </div>
        <div class="page-box" id="contentPage">
            <div class="envelope-icon">💌</div>
            <h2 class="title">有人向你表白</h2>
            <div class="msg-box">
                <div class="msg-content" id="confessionText"></div>
            </div>
            <div class="chat-container" id="chatContainer">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" class="input-box" id="chatInput" placeholder="回复消息..." maxlength="500">
                    <button class="btn" id="sendChatBtn" style="width:auto;">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) {
            document.querySelector('#loadingPage .title').innerText = '无效链接';
            return;
        }

        let lastMessageCount = 0;
        let pollingTimer = null;

        // 初始化：获取会话信息，标记自己已加入
        async function initSession() {
            try {
                // 标记加入并获取会话数据
                const res = await fetch('/api/check-join', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '会话无效或已过期');
                // 显示告白内容
                document.getElementById('confessionText').innerText = data.base || '对方没有留下文字，但心意已传达。';
                document.getElementById('loadingPage').classList.remove('active');
                document.getElementById('contentPage').classList.add('active');
                // 开始轮询
                startPolling();
            } catch(e) {
                document.querySelector('#loadingPage .title').innerText = '💔 ' + e.message;
            }
        }

        function startPolling() {
            pollingTimer = setInterval(async () => {
                try {
                    const res = await fetch(`/api/get-session?token=${token}`);
                    const data = await res.json();
                    if (data.messages && data.messages.length > lastMessageCount) {
                        renderMessages(data.messages);
                        lastMessageCount = data.messages.length;
                        document.getElementById('chatContainer').style.display = 'block';
                    }
                } catch(e) {
                    clearInterval(pollingTimer);
                    alert('会话已失效');
                }
            }, 3000);
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg ' + (msg.role === 'sender' ? 'sender' : 'receiver');
                div.innerText = msg.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('sendChatBtn').addEventListener('click', async () => {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;
            try {
                await fetch('/api/send-message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token, role: 'receiver', content })
                });
                input.value = '';
                lastMessageCount = 0;
            } catch(e) {
                alert('发送失败');
            }
        });

        window.addEventListener('beforeunload', () => {
            if (pollingTimer) clearInterval(pollingTimer);
        });

        initSession();
    </script>
</body>
</html>
