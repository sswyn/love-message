<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>暮风藏情 - 发送方聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",system-ui,sans-serif}
:root{--pink:#ff6b8b;--light:#ffc2d4;--dark:#d64c6e;--gray:#444;--bg:rgba(255,255,255,0.72)}
body{background:linear-gradient(160deg,#ffe8f0,#ffd8e5,#ffc2d4);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:25px 20px 160px}
.card{background:var(--bg);backdrop-filter:blur(20px);border-radius:24px;border:2px solid rgba(255,150,180,.4);box-shadow:0 8px 30px rgba(255,120,150,.25);width:100%;max-width:430px;padding:30px}
.title{background:linear-gradient(120deg,var(--dark),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;font-size:24px;text-align:center;font-weight:600;margin-bottom:16px;letter-spacing:2px}
.cbox{background:#fffdfb;border-radius:16px;padding:16px;border:1px solid rgba(255,180,200,.5);min-height:80px;max-height:150px;overflow-y:auto;line-height:1.7;white-space:pre-line;font-size:14px;color:var(--gray);margin-bottom:12px}
.status{text-align:center;font-size:14px;color:var(--dark);margin:10px 0}
.cm{border:1px solid rgba(255,180,200,.5);border-radius:16px;padding:16px;height:260px;overflow-y:auto;background:#fffdfb;margin-bottom:12px}
.cm .msg{margin-bottom:10px;padding:8px 14px;border-radius:14px;max-width:80%;clear:both;line-height:1.5;font-size:14px;word-break:break-word}
.msg.s{background:linear-gradient(135deg,#ff6b8b,#ff8da8);color:#fff;float:right}
.msg.r{background:#f0f0f0;float:left;color:#444}
.msg.sys{background:#fff3e0;color:#e65100;float:none;text-align:center;max-width:100%;font-size:13px;margin:12px 0}.tgl{padding:6px 12px;border-radius:8px;font-size:13px;color:var(--dark);background:rgba(255,200,210,.3);cursor:pointer;margin-bottom:12px;text-align:center;display:none}.tgl:hover{background:rgba(255,200,210,.5)}.link-box{background:#fffdfb;border:1px solid rgba(255,180,200,.4);border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px;display:none}.link-box .lr{margin-bottom:8px}.link-box .lr label{color:#888;display:block;margin-bottom:3px;font-size:12px}.link-box .lr span{color:var(--dark);font-size:12px;word-break:break-all}.link-box .btn{width:100%;padding:8px;font-size:13px;margin-top:4px}
.ci{display:flex;gap:10px;margin-top:10px}
.ci input{flex:1;padding:12px 16px;border:1px solid rgba(255,180,200,.5);border-radius:14px;outline:none;font-size:14px;background:#fffdfb}
.ci input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,139,.25)}
.btn{background:linear-gradient(135deg,var(--pink),#ff8da8);color:#fff;border:none;border-radius:14px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err{text-align:center;color:#ef5350;padding:40px 0}
.err a{display:inline-block;margin-top:20px;padding:12px 30px;background:linear-gradient(135deg,#ff6b8b,#ff8da8);color:#fff;border-radius:14px;text-decoration:none}
.loading{text-align:center;padding:40px 0;color:#a05872}
</style>
</head>
<body>
<div class="card" id="app">
<div class="loading" id="loadingView">
<div style="font-size:36px;margin-bottom:10px;">💌</div>
<h2>加载中...</h2>
</div>
</div>

<div class="tgl" id="toggleLinks" style="display:none;">🔗 查看链接</div>
<div class="link-box" id="linkBox">
<div class="lr"><label>📩 接收方链接（发给对方）：</label><span id="recvLink">—</span></div>
<div class="lr"><label>💬 发送方链接（你自己保存）：</label><span id="sendLink">—</span></div>
<button class="btn" id="copyRecvBtn">📋 复制接收方链接</button>
<button class="btn" id="copySendBtn" style="margin-top:6px">📋 复制发送方链接</button>
</div>

<script>
function esc(t){var d=document.createElement('div');d.innerText=t;return d.innerHTML}

var params=new URLSearchParams(window.location.search);
var token=params.get('token');

if(!token){
token=localStorage.getItem('love_sender_token');
if(!token){
document.getElementById('app').innerHTML='<div class="err"><h3>❌ 无效链接</h3><p style="margin-top:12px;color:#888;">缺少会话Token，请从发起告白页面重新进入。</p><a href="/">创建新告白</a></div>';
throw new Error('no token')}
}

localStorage.setItem('love_sender_token',token);

var lmc=0,pt=null,active=true;

async function loadSession(){
var r=await fetch('/api/get-session?token='+token);
var ct=r.headers.get('content-type')||'';
if(!ct.includes('application/json')){var txt=await r.text();throw new Error('API返回格式异常，请检查路由配置');}
var d=await r.json();
if(!r.ok)throw new Error(d.error||'会话无效');
return d
}

async function init(){
try{
var data=await loadSession();
var base=data.base||'(对方没有留下文字)';
var links=getLinks(token);
document.getElementById('app').innerHTML=
'<div class="title">💬 暮风藏情 - 发送方聊天室</div>'+
'<div class="cbox" id="confessionText">'+esc(base)+'</div>'+
'<div class="status" id="statusText">'+(data.joined?'✅ 对方已加入，开始聊天吧！':'⏳ 等待对方打开链接...')+'</div>'+
'<div class="cm" id="chatMessages"></div>'+
'<div class="ci"><input type="text" id="chatInput" placeholder="说点什么吧..." maxlength="500"><button class="btn" id="sendBtn">发送</button></div>';
if(data.messages){renderMsgs(data.messages);lmc=data.messages.length}
// 显示链接
var tl=document.getElementById('toggleLinks');if(tl)tl.style.display='block';
var lb=document.getElementById('linkBox');if(lb){document.getElementById('recvLink').innerText=links.recv;document.getElementById('sendLink').innerText=links.send}
// 立即获取最新消息，然后开始轮询
await fetchMessages();
startPolling();
setupSend()
}catch(e){
document.getElementById('app').innerHTML='<div class="err"><h3>❌ 加载失败</h3><p style="margin-top:12px;color:#888;">'+esc(e.message)+'</p></div>'
}
}

function getLinks(t){
var base=window.location.origin;
return{recv:base+'/receive.html?token='+t,send:base+'/sender.html?token='+t}
}

async function fetchMessages(){
if(!active)return;
var r=await fetch('/api/get-session?token='+token);
var d=await r.json();
if(!r.ok)throw new Error(d.error);
var st=document.getElementById('statusText');
if(st)st.innerText=d.joined?'✅ 对方已加入，开始聊天吧！':'⏳ 等待对方打开链接...';
if(d.messages&&d.messages.length>lmc){renderMsgs(d.messages);lmc=d.messages.length}
return d
}

function startPolling(){
if(pt)return;
pt=setInterval(async function(){
try{await fetchMessages()}catch(e){
clearInterval(pt);pt=null;
var st=document.getElementById('statusText');
if(st)st.innerText='❌ 会话已断开';
active=false
}
},2000)
}

function renderMsgs(msgs){
var c=document.getElementById('chatMessages');
if(!c)return;
c.innerHTML='';
for(var i=0;i<msgs.length;i++){
var m=msgs[i];
var div=document.createElement('div');
// 系统消息：包含 接受/婉拒/告白 关键词
if((m.content&&m.content.indexOf('接受')!==-1)||(m.content&&m.content.indexOf('婉拒')!==-1)){div.className='msg sys'}
else{div.className='msg '+(m.role==='sender'?'s':'r')}
div.innerText=m.content;
c.appendChild(div)}
c.scrollTop=c.scrollHeight
}

function setupSend(){
var inp=document.getElementById('chatInput');
var btn=document.getElementById('sendBtn');
if(!btn||!inp)return;
async function send(){
var content=inp.value.trim();
if(!content||btn.disabled)return;
btn.disabled=true;
try{
await fetch('/api/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,role:'sender',content:content})});
inp.value='';lmc=0
}catch(e){console.error('发送失败',e)}
btn.disabled=false
}
btn.addEventListener('click',send);
inp.addEventListener('keydown',function(e){
if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});
// 链接显示/复制
var tl=document.getElementById('toggleLinks');
if(tl)tl.addEventListener('click',function(){
var lb=document.getElementById('linkBox');
if(lb)lb.style.display=lb.style.display==='none'||!lb.style.display?'block':'none'
});
function copyText(text,btn){
navigator.clipboard.writeText(text).then(function(){
btn.innerText='✅ 已复制';
setTimeout(function(){btn.innerText=btn.innerText.indexOf('接收方')>-1?'📋 复制接收方链接':'📋 复制发送方链接'},2000)
}).catch(function(){alert('复制失败，请手动复制')})
}
var crb=document.getElementById('copyRecvBtn');
var csb=document.getElementById('copySendBtn');
if(crb)crb.addEventListener('click',function(){copyText(document.getElementById('recvLink').innerText,this)});
if(csb)csb.addEventListener('click',function(){copyText(document.getElementById('sendLink').innerText,this)})
}

window.addEventListener('beforeunload',function(){if(pt){clearInterval(pt);pt=null}});
init();
</script>
</body>
</html>
