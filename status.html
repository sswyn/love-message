<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暮风藏情 - 心意回执</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", system-ui, sans-serif; }
        :root {
            --main-pink: #ff6b8b; --light-pink: #ffc2d4; --dark-pink: #d64c6e;
            --success-green: #52b788; --danger-red: #ef5350; --text-gray: #444;
            --text-light: #a05872; --bg-blur: rgba(255, 255, 255, 0.72);
        }
        body {
            background: linear-gradient(160deg, #ffe8f0, #ffd8e5, #ffc2d4);
            background-attachment: fixed; min-height: 100vh; display: flex;
            justify-content: center; align-items: flex-start; padding: 25px 20px 60px; position: relative;
        }
        .receive-card {
            background: var(--bg-blur); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 24px; border: 2px solid rgba(255, 150, 180, 0.4);
            box-shadow: 0 8px 30px rgba(255, 120, 150, 0.25); width: 100%; max-width: 430px;
            position: relative; z-index: 10; animation: cardFadeIn 0.8s ease-out forwards;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .envelope-icon { text-align: center; font-size: 36px; margin-bottom: 10px; }
        .title {
            background: linear-gradient(120deg, var(--dark-pink), var(--main-pink));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-align: center; font-size: 26px; letter-spacing: 3px; margin-bottom: 8px; font-weight: 600;
        }
        .status-badge { text-align: center; font-size: 15px; margin: 10px 0 20px; color: var(--text-light); }
        .status-badge .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .dot.read { background: #52b788; } .dot.unread { background: #ccc; }
        .dot.accepted { background: #52b788; } .dot.refused { background: #ef5350; } .dot.pending { background: #fbbf24; }
        .info-card {
            background: #fffdfb; border-radius: 18px; padding: 22px; margin-bottom: 20px;
            border: 1px solid rgba(255, 180, 200, 0.5); box-shadow: 0 4px 16px rgba(255, 180, 200, 0.15);
        }
        .info-label { font-size: 14px; color: var(--text-light); margin-bottom: 8px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .info-label::before { content: "📌"; }
        .info-content { color: var(--text-gray); font-size: 15px; line-height: 1.8; white-space: pre-line; }
        .reply-section {
            background: #fffdfb; border-radius: 18px; padding: 22px; margin-top: 20px;
            border: 1px solid rgba(255, 180, 200, 0.5); min-height: 120px;
        }
        .reply-label { font-size: 14px; color: var(--text-light); margin-bottom: 10px; font-weight: 500; }
        .reply-content { color: var(--text-gray); font-size: 15px; line-height: 1.8; white-space: pre-line; }
        .reply-content.empty { color: #999; font-style: italic; }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 16px;
            cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px; font-weight: 500;
            background: linear-gradient(135deg, var(--main-pink), #ff8da8); color: #fff;
            box-shadow: 0 4px 12px rgba(255, 107, 139, 0.3); margin-top: 20px;
        }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="receive-card">
        <div class="envelope-icon">💌</div>
        <h2 class="title">暮风藏情</h2>
        <p class="status-badge" id="statusBadge">
            <span class="dot unread"></span> 对方还未查看
        </p>
        <div class="info-card">
            <div class="info-label">你的告白内容</div>
            <div class="info-content" id="myMessage"></div>
        </div>
        <div class="reply-section" id="replySection" style="display:none;">
            <div class="reply-label">对方的回信</div>
            <div class="reply-content" id="replyMessage"></div>
        </div>
        <button class="btn" id="backBtn">返回首页</button>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status') || 'unread';
    const myMsg = urlParams.get('msg') || '你的告白内容暂时无法显示。';
    const replyMsg = urlParams.get('reply') || '';

    document.getElementById('myMessage').innerText = myMsg;

    const statusBadge = document.getElementById('statusBadge');
    const replySection = document.getElementById('replySection');
    const replyContent = document.getElementById('replyMessage');

    function updateStatus(status) {
        let dotClass = 'unread';
        let text = '对方还未查看';
        if (status === 'read') {
            dotClass = 'read';
            text = '对方已查看，但尚未回应';
        } else if (status === 'accepted') {
            dotClass = 'accepted';
            text = '对方欣然接受了你的心意 ❤️';
            replySection.style.display = 'block';
            replyContent.innerText = replyMsg;
            replyContent.classList.remove('empty');
        } else if (status === 'refused') {
            dotClass = 'refused';
            text = '对方委婉拒绝了，但感谢你的真诚';
            replySection.style.display = 'block';
            replyContent.innerText = replyMsg || '虽然没有回信，但你的心意已经被妥善收藏。';
            replyContent.classList.toggle('empty', !replyMsg);
        }
        statusBadge.innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
    }
    updateStatus(status);

    document.getElementById('backBtn').addEventListener('click', ()=>{
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
