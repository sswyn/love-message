<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暮风藏情 - 发起告白</title>
    <style>
        /* 保留原有样式，新增聊天相关样式 */
        .chat-container { display: none; margin-top: 20px; }
        .chat-messages { border:1px solid #ffc2d4; border-radius:12px; padding:10px; height:200px; overflow-y:auto; background:#fff; margin-bottom:10px; }
        .chat-messages .msg { margin-bottom:8px; padding:6px 10px; border-radius:8px; max-width:80%; clear:both; }
        .msg.sender { background:#ff6b8b; color:#fff; float:right; }
        .msg.receiver { background:#f0f0f0; float:left; }
        .chat-input-row { display:flex; gap:10px; }
        .chat-input-row input { flex:1; }
        .copy-link-box { background:#f9f9f9; border-radius:8px; padding:10px; margin:10px 0; word-break:break-all; font-size:13px; }
        .status-text { color: #d64c6e; font-weight:500; margin:10px 0; }
    </style>
</head>
<body>
    <!-- 保持原有漂浮特效等结构 -->

    <div class="receive-card">
        <!-- 欢迎页、身份验证页、卡密页、填写告白页、预览页保持不变 -->

        <!-- 新增：发送成功后的聊天等待页 -->
        <div class="page-box" id="chatPage">
            <div class="envelope-icon">💬</div>
            <h2 class="title">匿名聊天室</h2>
            <p class="tip-desc">你的告白链接已生成，请复制发给对方。对方打开后即可开始聊天。</p>
            <div class="copy-link-box" id="linkBox"></div>
            <button class="btn" id="copyChatLinkBtn" style="background:#52b788;">📋 复制链接</button>
            <div class="status-text" id="joinStatus">⏳ 等待对方加入...</div>
            <div class="chat-container" id="chatContainer">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" class="input-box" id="chatInput" placeholder="输入消息..." maxlength="500">
                    <button class="btn" id="sendChatBtn" style="width:auto; padding:12px 20px;">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 其他弹窗保持不变 -->

    <script>
        // 原有变量定义和函数...

        // 新增聊天相关变量
        let sessionToken = null;
        let chatPollingTimer = null;
        let lastMessageCount = 0;

        // 修改发送按钮事件
        els.sendBtn.addEventListener('click', async () => {
            if(els.sendBtn.disabled) return;
            els.sendBtn.disabled = true; els.sendBtn.innerText = '生成中...';

            const base = encodeURIComponent(els.baseMsg.value.trim());
            const agree = encodeURIComponent(els.agreeMsg.value.trim());
            const refuse = encodeURIComponent(els.refuseMsg.value.trim());
            const phoneNumber = els.phone.value.trim();

            try {
                const res = await fetch('/api/create-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ base, agree, refuse, phone: phoneNumber })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    sessionToken = data.token;
                    const link = `${window.location.origin}/receive.html?token=${sessionToken}`;
                    els.linkBox.innerText = link;
                    navigateTo('chatPage'); // 跳转到聊天页
                    startChatPolling();      // 开始轮询消息和对方状态
                } else {
                    throw new Error(data.error || '创建会话失败');
                }
            } catch(e) {
                alert('创建失败：' + e.message);
            }
            els.sendBtn.disabled = false;
            els.sendBtn.innerText = '匿名发送';
        });

        // 复制链接
        els.copyChatLinkBtn.addEventListener('click', () => {
            const link = els.linkBox.innerText;
            navigator.clipboard.writeText(link).then(() => {
                els.copyChatLinkBtn.innerText = '✅ 已复制';
                setTimeout(()=> els.copyChatLinkBtn.innerText = '📋 复制链接', 2000);
            });
        });

        // 轮询聊天
        function startChatPolling() {
            if (chatPollingTimer) return;
            chatPollingTimer = setInterval(async () => {
                if (!sessionToken) return;
                try {
                    const res = await fetch(`/api/get-session?token=${sessionToken}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    // 更新对方加入状态
                    if (data.joined) {
                        document.getElementById('joinStatus').innerText = '✅ 对方已加入，开始聊天吧！';
                    } else {
                        document.getElementById('joinStatus').innerText = '⏳ 等待对方加入...';
                    }
                    // 更新消息列表
                    if (data.messages && data.messages.length > lastMessageCount) {
                        renderMessages(data.messages);
                        lastMessageCount = data.messages.length;
                        document.getElementById('chatContainer').style.display = 'block';
                    }
                } catch(e) {
                    console.error('轮询失败:', e);
                    // 可能会话过期等
                    clearInterval(chatPollingTimer);
                    chatPollingTimer = null;
                    document.getElementById('joinStatus').innerText = '❌ 会话已失效';
                }
            }, 3000);
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg ' + (msg.role === 'sender' ? 'sender' : 'receiver');
                div.innerText = msg.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        document.getElementById('sendChatBtn').addEventListener('click', async () => {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content || !sessionToken) return;
            try {
                await fetch('/api/send-message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token: sessionToken, role: 'sender', content })
                });
                input.value = '';
                // 手动触发一次立即更新
                lastMessageCount = 0; // 强制刷新
            } catch(e) {
                alert('发送失败');
            }
        });

        // 页面销毁时停止轮询
        window.addEventListener('beforeunload', () => {
            if (chatPollingTimer) clearInterval(chatPollingTimer);
        });
    </script>
</body>
</html>
